{% extends 'main_general.html' %}

{% block content %}
    <h1>Llista d'usuaris</h1>
        <ul>
            {% for k, v in msg.items %}
            <h3>{{ k }}</h3>
            <li>id: {{ v.id }}</li>
            <li>nombre: {{ v.nombre }}</li>
            <li>apellido: {{ v.apellido }}</li>
            <li>años: {{v.años}} </li>
            <li>pais: {{v.pais}} </li>
            <br>
            {% endfor %}
        </ul>
{% endblock %}
