version: '3.1'
services:
 db:
   image: postgres:16
   container_name: djangoRoger
   environment:
     - POSTGRES_DB=djangoP
     - POSTGRES_PASSWORD=passs
     - POSTGRES_USER=user
   ports:
     - "5432:5432"
   volumes:
     - local_pgdata:/var/lib/postgresql/data
 pgadmin:
   image: dpage/pgadmin4
   container_name: djangoP
   ports:
     - "80:80"
   environment:
     PGADMIN_DEFAULT_EMAIL: admin@admin.com
     PGADMIN_DEFAULT_PASSWORD: admin
   volumes:
     - pgadmin-data:/var/lib/pgadmin
volumes:
 local_pgdata:
 pgadmin-data: